<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代化资源上传中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #2ea44f;
            --accent-glow: #4ade80;
            --accent-blue: #2f81f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(46, 164, 79, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(47, 129, 247, 0.05) 0%, transparent 40%);
        }

        .upload-container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* 顶部提示栏 */
        .tips-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(240, 135, 0, 0.1);
            border: 1px solid rgba(240, 135, 0, 0.2);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .tips-banner i {
            color: #f08700;
        }

        .tips-banner a {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--accent-glow);
            padding-bottom: 2px;
            transition: all 0.2s;
        }

        .tips-banner a:hover {
            color: #fff;
            border-bottom-style: solid;
        }

        /* 拖拽上传区 */
        .drop-zone {
            border: 2px dashed rgba(74, 222, 128, 0.3);
            background: rgba(22, 27, 34, 0.4);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: Img-box-shadow 0.3s, border-color 0.3s, background 0.3s;
            margin-bottom: 20px;
            position: relative;
        }

        .drop-zone:hover {
            border-color: var(--accent-glow);
            background: rgba(74, 222, 128, 0.03);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.1);
        }

        .drop-zone .upload-icon {
            font-size: 48px;
            color: var(--accent-glow);
            margin-bottom: 12px;
            display: inline-block;
            transition: transform 0.3s;
        }

        .drop-zone:hover .upload-icon {
            transform: translateY(-4px);
        }

        .drop-zone h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .drop-zone h3 span {
            color: var(--accent-glow);
            font-weight: 600;
        }

        .drop-zone p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 隐藏的原生 file input */
        .file-input {
            display: none;
        }

        /* 文件夹结构包导入选项 */
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        /* 晶莹滑动开关 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #30363d;
            transition: .3s;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #f0f6fc;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* 表单输入组 */
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            background: #161b22;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.2);
            background: #1f242c;
        }

        /* 关联标签区 */
        .tag-section {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .tag-section p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .tag-group {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .tag-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 标签选中及悬停动效 */
        .tag-btn[data-type="light"]:hover, 
        .tag-btn[data-type="light"].active {
            border-color: var(--accent-glow);
            color: var(--accent-glow);
            background: rgba(74, 222, 128, 0.08);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.15);
        }

        .tag-btn[data-type="resource"]:hover, 
        .tag-btn[data-type="resource"].active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(47, 129, 247, 0.08);
            box-shadow: 0 0 12px rgba(47, 129, 247, 0.15);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2ea44f, #238636);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(35, 134, 54, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="upload-container">
    <div class="tips-banner">
        <i class="ri-lightbulb-line"></i>
        <span>想要在线收藏？可以直接前往 <a href="#">资源下载页</a> &rarr; 浏览检索并一键收藏。</span>
    </div>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="file-input" accept=".zip">
        <i class="ri-cloud-upload-line upload-icon"></i>
        <h3>拖拽文件到此处，或 <span>浏览本地文件</span></h3>
        <p>支持 .zip 文件压缩包或文件夹</p>
    </div>

    <div class="toggle-container">
        <span class="toggle-label">导入文件夹结构包（非压缩包）</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="title">收藏标题 (必填)</label>
            <input type="text" id="title" class="form-control" placeholder="输入收藏标题" required>
        </div>
        <div class="form-group">
            <label for="version">版本号</label>
            <input type="text" id="version" class="form-control" value="1.0.0">
        </div>
    </div>

    <div class="tag-section">
        <p>关联标签（选择“光影”或“资源包”系统标签会自动识别对应类型进行底层处理）</p>
        <div class="tag-group">
            <button type="button" class="tag-btn" data-type="light" onclick="toggleTag(this)">
                <i class="ri-magic-line"></i> 光影
            </button>
            <button type="button" class="tag-btn" data-type="resource" onclick="toggleTag(this)">
                <i class="ri-box-3-line"></i> 资源包
            </button>
        </div>
    </div>

    <button type="button" class="submit-btn">保存并提交收藏</button>
</div>

<script>
    // 处理标签切换的简单 JS 交互
    function toggleTag(button) {
        button.classList.toggle('active');
    }

    // 拖拽高亮效果
    const dropZone = document.querySelector('.drop-zone');
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent-glow)';
            dropZone.style.background = 'rgba(74, 222, 128, 0.06)';
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'rgba(74, 222, 128, 0.3)';
            dropZone.style.background = 'rgba(22, 27, 34, 0.4)';
        }, false);
    });
</script>

</body>
</html>
